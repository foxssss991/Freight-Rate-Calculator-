<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freight Rate Calculator Pro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: #eef3f8;
    color: #333;
    padding: 30px;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #1f2937;
}

.card {
    background: #fff;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
    margin-bottom: 25px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 6px;
    font-weight: 600;
}

input,
select {
    width: 100%;
    padding: 12px;
    border: 1px solid #d6d6d6;
    border-radius: 10px;
    font-size: 15px;
    transition: .2s;
}

input:focus,
select:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,.15);
}

button {
    width: 100%;
    padding: 16px;
    margin-top: 25px;
    border: none;
    border-radius: 12px;
    background: #007bff;
    color: white;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: .25s;
}

button:hover {
    background: #005fd1;
}

.input-group {
    display: flex;
    gap: 10px;
}
.input-group input {
    flex: 1;
}
.input-group button {
    margin-top: 0;
    width: auto;
    padding: 0 15px;
    font-size: 14px;
}
.btn-gray {
    background: #4b5563;
}
.btn-gray:hover {
    background: #374151;
}
.btn-purple {
    background: #8b5cf6;
}
.btn-purple:hover {
    background: #7c3aed;
}

.results {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
    margin-top: 25px;
}

.results h2 {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #007bff;
    color: white;
    padding: 12px;
    text-align: left;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ececec;
}

tr:hover {
    background: #f8fafc;
}

.history {
    margin-top: 35px;
}

.delete {
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    width: auto;
    margin: 0;
}

.delete:hover {
    background: #b52a37;
}

.status-good {
    color: #16a34a;
    font-weight: bold;
}

.status-average {
    color: #ca8a04;
    font-weight: bold;
}

.status-low {
    color: #dc2626;
    font-weight: bold;
}

@media(max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
    body {
        padding: 15px;
    }
    .card,
    .results {
        padding: 18px;
    }
}

.btn-group {
    display: flex;
    gap: 15px;
    margin-top: 25px;
}
.btn-group button {
    margin-top: 0;
}
.btn-auto {
    background: #16a34a;
}
.btn-auto:hover {
    background: #15803d;
}

.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.history-header h2 {
    margin-bottom: 0;
}
.history-actions {
    display: flex;
    gap: 10px;
}
.btn-export {
    background: #4b5563;
    padding: 8px 12px;
    font-size: 14px;
    margin: 0;
    border-radius: 8px;
}
.btn-export:hover {
    background: #374151;
}
</style>
</head>
<body>

<div class="container">
    <h1>🚛 Freight Rate Calculator Pro</h1>

    <div class="card">
        <div class="grid">
            <div>
                <label>Origin</label>
                <input id="origin" placeholder="e.g. Chicago, IL">

                <label>Destination</label>
                <input id="destination" placeholder="e.g. Dallas, TX">

                <label>Equipment</label>
                <select id="equipment">
                    <option value="Dry Van">Dry Van</option>
                    <option value="Reefer">Reefer</option>
                    <option value="Flatbed">Flatbed</option>
                    <option value="Step Deck">Step Deck</option>
                </select>

                <label>Market Condition</label>
                <select id="market">
                    <option value="1.0">Normal (1.0x)</option>
                    <option value="1.15">Hot Market (1.15x)</option>
                    <option value="0.85">Cold Market (0.85x)</option>
                </select>

                <label>Loaded Miles</label>
                <div class="input-group">
                    <input id="loaded" type="number" min="0">
                    <button id="calcMilesBtn" class="btn-gray" type="button" onclick="calculateMiles()">📍 Get Miles</button>
                </div>

                <label>Deadhead Miles</label>
                <input id="deadhead" type="number" value="0" min="0">
            </div>

            <div>
                <label>Weight (lbs)</label>
                <input id="weight" type="number" value="35000" min="0" max="50000">

                <label>Carrier Pay ($)</label>
                <div class="input-group">
                    <input id="carrier" type="number" min="0">
                    <button type="button" class="btn-auto" onclick="calcCarrierPay()">⚡ Smart Rate</button>
                </div>

                <label>Broker Margin ($)</label>
                <div class="input-group">
                    <input id="margin" type="number" min="0" value="200">
                    <button type="button" class="btn-purple" onclick="suggestMargin()">🪄 Auto</button>
                </div>

                <label>Fuel ($)</label>
                <input id="fuel" type="number" value="0" min="0">

                <label>Tolls ($)</label>
                <input id="tolls" type="number" value="0" min="0">

                <label>Lumper ($)</label>
                <input id="lumper" type="number" value="0" min="0">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="calculate()">Calculate</button>
            <button onclick="autoFullProcess()" class="btn-auto">Auto Rate & Margin</button>
        </div>
    </div>

    <div class="results">
        <h2>Results</h2>
        <table>
            <tr><td>Total Miles</td><td id="rMiles">-</td></tr>
            <tr><td>Customer Rate</td><td id="rRate">-</td></tr>
            <tr><td>Carrier RPM</td><td id="rCarrier">-</td></tr>
            <tr><td>Customer RPM</td><td id="rCustomer">-</td></tr>
            <tr><td>Broker Profit</td><td id="rProfit">-</td></tr>
            <tr><td>Status</td><td id="rStatus">-</td></tr>
        </table>
    </div>

    <div class="results history">
        <div class="history-header">
            <h2>History</h2>
            <div class="history-actions">
                <button class="btn-export" onclick="exportCSV()">Export CSV</button>
                <button class="delete" onclick="clearHistory()">Clear All</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Route</th>
                    <th>Rate</th>
                    <th>Profit</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
let history = JSON.parse(localStorage.getItem("freightHistory")) || [];

function escapeHTML(str) {
    return String(str).replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag]));
}

async function calculateMiles() {
    const origin = document.getElementById("origin").value.trim();
    const destination = document.getElementById("destination").value.trim();
    const btn = document.getElementById("calcMilesBtn");

    if (!origin || !destination) {
        alert("Please enter both Origin and Destination.");
        return;
    }

    btn.innerText = "⏳ Loading...";
    btn.disabled = true;

    try {
        const originRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(origin)}`);
        const originData = await originRes.json();
        if (originData.length === 0) throw new Error("Origin not found");
        const originCoords = `${originData[0].lon},${originData[0].lat}`;

        const destRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destination)}`);
        const destData = await destRes.json();
        if (destData.length === 0) throw new Error("Destination not found");
        const destCoords = `${destData[0].lon},${destData[0].lat}`;

        const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${originCoords};${destCoords}?overview=false`);
        const routeData = await routeRes.json();
        
        if (routeData.code === "Ok") {
            const meters = routeData.routes[0].distance;
            const miles = Math.round(meters / 1609.34);
            document.getElementById("loaded").value = miles;
        } else {
            throw new Error("Route calculation failed");
        }
    } catch (error) {
        alert("Error calculating distance: " + error.message + "\nPlease enter miles manually.");
    } finally {
        btn.innerText = "📍 Get Miles";
        btn.disabled = false;
    }
}

function calcCarrierPay() {
    const miles = Number(document.getElementById("loaded").value) || 0;
    const deadhead = Number(document.getElementById("deadhead").value) || 0;
    const weight = Number(document.getElementById("weight").value) || 35000;
    const equipment = document.getElementById("equipment").value;
    const market = Number(document.getElementById("market").value) || 1.0;

    if (miles === 0) {
        alert("Please get or enter Loaded Miles first.");
        return;
    }

    let baseRPM = 2.10;
    if (equipment === "Reefer") baseRPM = 2.45;
    if (equipment === "Flatbed") baseRPM = 2.60;
    if (equipment === "Step Deck") baseRPM = 2.80;

    let weightMultiplier = 1.0;
    if (weight > 42000) {
        weightMultiplier = 1.12;
    } else if (weight > 38000) {
        weightMultiplier = 1.06;
    } else if (weight < 15000) {
        weightMultiplier = 0.95;
    }

    let distanceMultiplier = 1.0;
    if (miles < 250) distanceMultiplier = 1.30;
    else if (miles < 500) distanceMultiplier = 1.10;
    else if (miles > 1000) distanceMultiplier = 0.92;

    let targetRPM = baseRPM * market * weightMultiplier * distanceMultiplier;
    
    let linehaulPay = miles * targetRPM;
    let deadheadPay = deadhead * (targetRPM * 0.6);
    let totalCarrierPay = Math.round(linehaulPay + deadheadPay);

    document.getElementById("carrier").value = totalCarrierPay;
    suggestMargin();
}

function suggestMargin() {
    const carrierPay = Number(document.getElementById("carrier").value) || 0;
    const equipment = document.getElementById("equipment").value;

    let suggestedMargin = 150;

    if (carrierPay > 0) {
        suggestedMargin = carrierPay * 0.12;
    }

    if (equipment === "Reefer" || equipment === "Flatbed" || equipment === "Step Deck") {
        suggestedMargin += 35;
    }

    suggestedMargin = Math.round(suggestedMargin / 10) * 10;
    
    if (suggestedMargin < 150) suggestedMargin = 150;
    if (suggestedMargin > 350) suggestedMargin = 350;

    document.getElementById("margin").value = suggestedMargin;
}

function autoFullProcess() {
    calcCarrierPay();
    suggestMargin();
}

function calculate() {
    const origin = document.getElementById("origin").value || "Unknown";
    const destination = document.getElementById("destination").value || "Unknown";
    
    if (origin === "Unknown" || destination === "Unknown") {
        alert("Please enter Origin and Destination.");
        return;
    }

    const loadedMiles = Number(document.getElementById("loaded").value) || 0;
    const deadhead = Number(document.getElementById("deadhead").value) || 0;
    const carrierPay = Number(document.getElementById("carrier").value) || 0;
    const margin = Number(document.getElementById("margin").value) || 0;
    const fuel = Number(document.getElementById("fuel").value) || 0;
    const tolls = Number(document.getElementById("tolls").value) || 0;
    const lumper = Number(document.getElementById("lumper").value) || 0;

    const totalMiles = loadedMiles + deadhead;
    const customerRate = carrierPay + margin + fuel + tolls + lumper;
    const carrierRPM = loadedMiles > 0 ? carrierPay / loadedMiles : 0;
    const customerRPM = loadedMiles > 0 ? customerRate / loadedMiles : 0;

    document.getElementById("rMiles").innerHTML = totalMiles.toFixed(0) + " mi";
    document.getElementById("rRate").innerHTML = "$" + customerRate.toFixed(2);
    document.getElementById("rCarrier").innerHTML = "$" + carrierRPM.toFixed(2);
    document.getElementById("rCustomer").innerHTML = "$" + customerRPM.toFixed(2);
    document.getElementById("rProfit").innerHTML = "$" + margin.toFixed(2);

    let statusElement = document.getElementById("rStatus");

    if (customerRPM >= 2.80) {
        statusElement.innerHTML = "🟢 Excellent Rate";
        statusElement.className = "status-good";
    } else if (customerRPM >= 2.10) {
        statusElement.innerHTML = "🟡 Average Rate";
        statusElement.className = "status-average";
    } else {
        statusElement.innerHTML = "🔴 Low Rate";
        statusElement.className = "status-low";
    }

    const load = {
        date: new Date().toLocaleString(),
        route: origin + " → " + destination,
        rate: customerRate.toFixed(2),
        rpm: customerRPM.toFixed(2),
        profit: margin.toFixed(2)
    };

    history.push(load);
    localStorage.setItem("freightHistory", JSON.stringify(history));

    document.getElementById("origin").value = "";
    document.getElementById("destination").value = "";
    
    renderHistory();
}

function renderHistory() {
    const body = document.getElementById("historyBody");
    let htmlStr = ""; 

    history.forEach((item, index) => {
        htmlStr += `
        <tr>
            <td>${escapeHTML(item.date)}</td>
            <td>${escapeHTML(item.route)}</td>
            <td>$${escapeHTML(item.rate)}</td>
            <td>$${escapeHTML(item.profit)}</td>
            <td>
                <button class="delete" onclick="deleteLoad(${index})">❌</button>
            </td>
        </tr>`;
    });

    body.innerHTML = htmlStr;
}

function deleteLoad(index) {
    history.splice(index, 1);
    localStorage.setItem("freightHistory", JSON.stringify(history));
    renderHistory();
}

function clearHistory() {
    if (confirm("Delete all history?")) {
        history = [];
        localStorage.removeItem("freightHistory");
        renderHistory();
    }
}

// Переработанный стиль экспорта в CSV: красивый HTML/CSS отчёт прямо в файле или чистая аккуратная таблица
function exportCSV() {
    if (history.length === 0) {
        alert("History is empty");
        return;
    }

    // Генерируем красивую стилизованную HTML-страницу отчета, которая сохраняется как файл .html
    let htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Freight Dispatch Report</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #1e293b; padding: 40px; margin: 0; }
    .report-container { max-width: 900px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #007bff; }
    h2 { margin-top: 0; color: #0f172a; font-size: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #e0f2fe; color: #0369a1; padding: 5px 12px; font-size: 13px; border-radius: 20px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: #f1f5f9; color: #475569; font-weight: 600; text-align: left; padding: 12px; font-size: 14px; border-bottom: 2px solid #cbd5e1; }
    td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #334155; }
    tr:hover { background: #f8fafc; }
    .profit { color: #16a34a; font-weight: 600; }
    .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 15px; }
</style>
</head>
<body>
<div class="report-container">
    <h2><span>🚛 Freight Dispatch Report</span> <span class="badge">Pro Analytics</span></h2>
    <table>
        <thead>
            <tr>
                <th>Date & Time</th>
                <th>Route (Origin → Destination)</th>
                <th>Customer Rate</th>
                <th>RPM</th>
                <th>Broker Profit</th>
            </tr>
        </thead>
        <tbody>`;

    history.forEach(item => {
        htmlContent += `
            <tr>
                <td>${escapeHTML(item.date)}</td>
                <td><strong>${escapeHTML(item.route)}</strong></td>
                <td>$${escapeHTML(item.rate)}</td>
                <td>$${escapeHTML(item.rpm)}</td>
                <td class="profit">+$${escapeHTML(item.profit)}</td>
            </tr>`;
    });

    htmlContent += `
        </tbody>
    </table>
    <div class="footer">Generated automatically by Freight Rate Calculator Pro</div>
</div>
</body>
</html>`;

    let blob = new Blob([htmlContent], { type: "text/html;charset=utf-8;" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "freight_report.html";
    link.click();
}

renderHistory();
</script>

</body>
</html>
